<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One For All Planner</title>

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--card-light:#1e222b;
--text:#f1f5f9;
--muted:#9ca3af;
--primary:#3b82f6;
--danger:#ef4444;
}

body.light{
--bg:#f3f4f6;
--card:#ffffff;
--card-light:#f9fafb;
--text:#111827;
--muted:#6b7280;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
padding:40px;
}

.container{max-width:1000px;width:100%}

.card{
background:var(--card);
padding:30px;
border-radius:12px;
}

form{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:20px;
}

input,select,button{
padding:10px;
border-radius:8px;
border:none;
}

button{
background:var(--primary);
color:white;
cursor:pointer;
}

.summary{
display:flex;
gap:20px;
margin-top:15px;
flex-wrap:wrap;
}

.badge{
background:var(--card-light);
padding:10px;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
text-align:center;
}

canvas{
margin-top:25px;
background:var(--card-light);
border-radius:10px;
display:none;
}

.toggle{
float:right;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<button id="themeToggle" class="toggle">Toggle Theme</button>

<h2>One For All Daily Planner</h2>

<form id="plannerForm">
<select id="day" required>
<option value="">Day</option>
<option>Sunday</option>
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
</select>

<input type="date" id="date" required>

<select id="topic" required>
<option value="">Topic</option>
<option>IELTS</option>
<option>DSA-Java</option>
<option>Python</option>
<option>AI</option>
</select>

<input id="hours" placeholder="2 or 2.5" required>
<button>Add</button>
</form>

<div class="summary">
<div class="badge">Total Hours: <span id="totalHours">0</span></div>
<div class="badge" id="topicSummary"></div>
</div>

<table>
<thead>
<tr>
<th>Day</th>
<th>Date</th>
<th>Topic</th>
<th>Hours</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<canvas id="chart" width="500" height="260"></canvas>

</div>
</div>

<script>

/* ================= STORAGE ================= */
const Storage=(()=>{
const KEY="plannerData";
return{
get:()=>JSON.parse(localStorage.getItem(KEY))||[],
save:data=>localStorage.setItem(KEY,JSON.stringify(data))
};
})();

/* ================= UI ================= */
const UI=(()=>{
const table=document.getElementById("tableBody");
const total=document.getElementById("totalHours");
const topic=document.getElementById("topicSummary");

const render=data=>{

table.innerHTML="";

if(!data.length){
table.innerHTML=`<tr><td colspan="5" style="color:gray;">No entries yet.</td></tr>`;
}

data.forEach((item,i)=>{
table.innerHTML+=`
<tr>
<td>${item.day}</td>
<td>${item.date}</td>
<td>${item.topic}</td>
<td>${item.hours}</td>
<td><button class="del" data-i="${i}">Delete</button></td>
</tr>`;
});

updateStats(data);
drawPieChart(data);
};

const updateStats=data=>{
let totalHours=0;
const topics={};

data.forEach(d=>{
totalHours+=d.hours;
topics[d.topic]=(topics[d.topic]||0)+d.hours;
});

total.textContent=totalHours.toFixed(2);
topic.innerHTML=
Object.entries(topics)
.map(([t,h])=>`${t}: ${h}`)
.join(" | ");
};

return{render};
})();

/* ================= SIMPLE PIE CHART ================= */
function drawPieChart(data){

const canvas=document.getElementById("chart");
const ctx=canvas.getContext("2d");

if(!data.length){
canvas.style.display="none";
return;
}

canvas.style.display="block";
ctx.clearRect(0,0,canvas.width,canvas.height);

const topics={};
data.forEach(d=>{
topics[d.topic]=(topics[d.topic]||0)+d.hours;
});

const labels=Object.keys(topics);
const values=Object.values(topics);
const total=values.reduce((a,b)=>a+b,0);

const colors=["#3b82f6","#f97316","#ef4444","#10b981","#a855f7","#eab308"];

const cx=250, cy=130, radius=100;

let startAngle=-Math.PI/2;
let slices=[];

labels.forEach((label,i)=>{
const sliceAngle=(values[i]/total)*2*Math.PI;
const endAngle=startAngle+sliceAngle;

ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.arc(cx,cy,radius,startAngle,endAngle);
ctx.closePath();

ctx.fillStyle=colors[i%colors.length];
ctx.fill();

slices.push({label,value:values[i],start:startAngle,end:endAngle});

startAngle=endAngle;
});

/* Hover Tooltip */
canvas.onmousemove=e=>{
const rect=canvas.getBoundingClientRect();
const mx=e.clientX-rect.left;
const my=e.clientY-rect.top;

const dx=mx-cx;
const dy=my-cy;
const dist=Math.sqrt(dx*dx+dy*dy);

if(dist>radius){
drawPieChart(data);
return;
}

let angle=Math.atan2(dy,dx);
if(angle<-Math.PI/2) angle+=2*Math.PI;

const slice=slices.find(s=>angle>=s.start&&angle<=s.end);
if(!slice){
drawPieChart(data);
return;
}

drawPieChart(data);

const percent=((slice.value/total)*100).toFixed(1);

ctx.fillStyle="rgba(0,0,0,.8)";
ctx.fillRect(mx+10,my-30,130,40);

ctx.fillStyle="#fff";
ctx.font="12px sans-serif";
ctx.fillText(slice.label,mx+20,my-12);
ctx.fillText(`${slice.value} hrs (${percent}%)`,mx+20,my+5);
};
}

/* ================= APP ================= */
const App=(()=>{
const form=document.getElementById("plannerForm");
const hours=document.getElementById("hours");

hours.addEventListener("input",()=>{
hours.value=
hours.value.replace(/[^0-9.]/g,"")
.replace(/(\..*)\./g,"$1");
});

form.addEventListener("submit",e=>{
e.preventDefault();
if(!/^\d+(\.\d{1,2})?$/.test(hours.value))return;

const entry={
day:day.value,
date:date.value,
topic:topic.value,
hours:parseFloat(hours.value)
};

const data=Storage.get();
data.push(entry);
Storage.save(data);
render();
form.reset();
});

document.body.addEventListener("click",e=>{
if(!e.target.classList.contains("del"))return;
const data=Storage.get();
data.splice(e.target.dataset.i,1);
Storage.save(data);
render();
});

function render(){
UI.render(Storage.get());
}

return{render};
})();

/* ================= THEME ================= */
const toggle=document.getElementById("themeToggle");

toggle.onclick=()=>{
document.body.classList.toggle("light");
localStorage.setItem("theme",
document.body.classList.contains("light")?"light":"dark");
};

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
}

/* INIT */
App.render();

</script>
</body>
</html>
